<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parallax Demo</title>
    <link rel="stylesheet" href="/assets/css/style.css"> <!-- Your custom CSS -->
</head>
<body>

    <!-- Parallax Section (Background Image) -->
    <div class="parallax"></div>

    <!-- Content Section -->
    <div class="content">
        <h2>Scroll Down</h2>
        <p>This is some example text inside the content section.</p>
    </div>

    <!-- Another Parallax Section -->
    <div class="parallax"></div>

    <div class="content">
        <h2>Another Section</h2>
        <p>More text here to demonstrate the effect.</p>
    </div>

</body>
</html>
