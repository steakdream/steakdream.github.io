<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parallax Full-Page Sections</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <!-- First Parallax Section -->
    <div class="parallax"></div>

    <!-- Full-Screen Content Section -->
    <div class="content">
        <nav>
            <a href="#about">About</a>
            <a href="#articles">Articles</a>
            <a href="#contact">Contact</a>
        </nav>
        <h2>Welcome</h2>
        <p>This is the introduction page.</p>
    </div>

    <!-- Second Parallax Section -->
    <div class="parallax"></div>

    <div class="content" id="about">
        <h2>About Us</h2>
        <p>More details about our website and purpose.</p>
    </div>

    <!-- Third Parallax Section -->
    <div class="parallax"></div>

    <div class="content" id="articles">
        <h2>Articles</h2>
        <p>Read our latest blog posts and insights.</p>
    </div>

    <!-- Fourth Parallax Section -->
    <div class="parallax"></div>

    <div class="content" id="contact">
        <h2>Contact Us</h2>
        <p>Get in touch with us here.</p>
    </div>

</body>
</html>
